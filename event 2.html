<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>getElementsByClassName</title>
</head>
<body>

<p class="text-item">Paragraph 1</p>
<p class="text-item">Paragraph 2</p>
<p class="text-item">Paragraph 3</p>

<script>
    // select elements by class name
    let items = document.getElementsByClassName("text-item");

    // loop through and change color
    for (let i = 0; i < items.length; i++) {
        items[i].style.color = "red";
    }
</script>

</body>
</html>
