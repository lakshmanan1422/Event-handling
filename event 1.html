<!DOCTYPE html>
<html>
<head>
    <title>getElementById</title>
</head>
<body>

<div id="header"></div>

<script>
    // select the div using id
    let element = document.getElementById("header");

    // change text
    element.textContent = "Hello World!";

    // change background color
    element.style.backgroundColor = "lightblue";
</script>

</body>
</html>
