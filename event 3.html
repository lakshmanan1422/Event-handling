<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>getElementsByTagName</title>
</head>
<body>

<ul>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
    <li>Item 4</li>
    <li>Item 5</li>
</ul>

<script>
    // select all li elements
    let items = document.getElementsByTagName("li");

    // change third item (index 2)
    items[2].textContent = "I am the chosen one";
    items[2].style.fontSize = "20px";
</script>

</body>
</html>
